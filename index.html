<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="style.css"
      rel="stylesheet"
    />
    <title></title>
  </head>
  <body>
      <div class="container">
      <div class="header">
        <div class="search-box">
          <input
            type="text"
            placeholder="Enter your Location"
            class="input-box"
          />
          <button class="fa-solid fa-magnifying-glass" id="searchBtn">
            search
            <!-- <img src="https://cdn-icons-png.flaticon.com/128/151/151773.png" loading="lazy" alt="Magnifying glass " title="Magnifying glass " width="40" height="40">
           -->
          </button>

        </div>
      </div>

   <div class="location-not-found">
    <h1>Sorry, Location Not Found!!!</h1>
    <img src="/assets/not-found.png" alt="" >
   </div>

      <div class="weather-body">
        <img
          src="/assets/light-rain.png"
          loading="lazy"
          alt="Sun "
          title="Sun "
          class="weather-img"
        />

        <div class="weather-box">
          <p class="temperature">0 <sup>°C</sup></p>
          <p class="description">Light Rain</p>
        </div>

        <div class="weather-details">
          <div class="humidity">
            <img
              src="https://cdn-icons-png.flaticon.com/128/17908/17908006.png"
              loading="lazy"
              alt="Humidity icon"
              title="Humidity icon"
              width="46"
              height="46"
            />
            <div class="text">
              <span id="humidity">45%</span>
              <p class="description">Humidity</p>
            </div>
          </div>

          <div class="wind">
            <img
              src="https://cdn-icons-png.flaticon.com/128/2011/2011448.png"
              loading="lazy"
              alt="Wind "
              title="Wind "
              width="46"
              height="46"
            />

            <div class="text">
              <span id="wind-speed">12Km/H</span>
              <p class="description">Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
   <script src="script.js"></script>
  </body>
</html>
